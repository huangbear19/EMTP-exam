<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMT-P 歷屆考題與解析產生器</title>
    <!-- Tailwind CSS (現代化UI框架) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse (用於解析CSV) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Marked (用於將AI生成的Markdown轉為漂亮網頁格式) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- FontAwesome (圖示庫) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f8fafc; }
        
        /* AI 解析內容的 Markdown 排版設定 */
        .markdown-body { font-size: 0.95rem; line-height: 1.7; color: #334155; }
        .markdown-body h3, .markdown-body h4 { font-size: 1.1rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #1e293b; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3rem; }
        .markdown-body p { margin-bottom: 1rem; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body strong { font-weight: 700; color: #0f172a; background-color: #f1f5f9; padding: 0.1rem 0.3rem; border-radius: 0.2rem; }
        .markdown-body blockquote { border-left: 4px solid #cbd5e1; padding-left: 1rem; color: #64748b; font-style: italic; }
        
        /* 載入動畫 */
        .loader {
            border: 3px solid #e2e8f0; border-radius: 50%; border-top: 3px solid #2563eb;
            width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle;
        }
        .loader-lg { width: 40px; height: 40px; border-width: 4px; border-top-width: 4px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen pb-16">

    <!-- 頂部標題區塊 -->
    <header class="bg-blue-900 text-white shadow-lg py-8 px-4 mb-8 border-b-4 border-blue-500">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-extrabold flex items-center gap-3 tracking-wide">
                    <i class="fa-solid fa-book-medical text-blue-300 text-3xl"></i>
                    EMT-P 歷屆考題與解析產生器
                </h1>
                <p class="text-blue-200 mt-2 text-sm md:text-base font-medium">
                    專為急診醫師與 EMS 專家設計的教學備課工具，深度整合《大白第三版》知識庫
                </p>
            </div>
            <div class="bg-blue-800/50 px-4 py-2 rounded-lg border border-blue-700/50 flex items-center gap-2 text-sm font-medium">
                <i class="fa-solid fa-server text-blue-300"></i>
                純網頁穩定運作中
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- 左側控制面板 -->
        <div class="lg:col-span-4 space-y-6">
            
            <!-- 步驟 1: 題庫狀態 -->
            <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800">
                    <span class="bg-blue-100 text-blue-700 w-7 h-7 rounded-full flex items-center justify-center text-sm">1</span> 
                    題庫狀態
                </h2>
                
                <!-- 動態狀態顯示區 -->
                <div id="statusContainer">
                    <div id="cloudLoadStatus" class="flex flex-col items-center justify-center p-6 bg-blue-50 rounded-xl border border-blue-100">
                        <span class="loader mb-3"></span>
                        <span class="text-sm text-blue-800 font-bold">正在從雲端載入題庫...</span>
                    </div>
                </div>

                <!-- 手動上傳備用方案 -->
                <div class="mt-5 pt-5 border-t border-slate-100 text-center">
                    <p class="text-xs text-slate-400 mb-3 font-medium">若需更新或雲端載入失敗，可手動上傳</p>
                    <label class="inline-flex justify-center items-center px-4 py-2 bg-white text-slate-600 rounded-lg border border-slate-300 cursor-pointer hover:bg-slate-50 hover:text-blue-600 hover:border-blue-300 transition-all text-sm shadow-sm font-medium">
                        <i class="fa-solid fa-cloud-arrow-up mr-2"></i> 選擇 CSV 檔案
                        <input type="file" id="csvFileInput" accept=".csv" class="hidden">
                    </label>
                </div>
            </div>

            <!-- 步驟 2: 搜尋篩選 -->
            <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800">
                    <span class="bg-blue-100 text-blue-700 w-7 h-7 rounded-full flex items-center justify-center text-sm">2</span> 
                    篩選章節
                </h2>
                <p class="text-sm text-slate-500 mb-4 font-medium">請輸入大白第三版的章節數字 (例如：1, 54, 56)</p>
                <div class="flex flex-col sm:flex-row gap-3">
                    <input type="text" id="chapterInput" placeholder="輸入章節..." 
                        class="flex-1 px-4 py-2.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-slate-700 font-medium bg-slate-50">
                    <button id="searchBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-bold transition-all shadow-md hover:shadow-lg flex items-center justify-center gap-2">
                        <i class="fa-solid fa-magnifying-glass"></i> 篩選
                    </button>
                </div>
            </div>

            <!-- 系統提示卡片 -->
            <div class="bg-amber-50 rounded-2xl p-5 border border-amber-200 text-sm text-amber-800 shadow-sm">
                <h3 class="font-bold mb-2 flex items-center gap-2 text-amber-900">
                    <i class="fa-solid fa-lightbulb text-amber-500"></i> 醫師專屬提示
                </h3>
                <p class="leading-relaxed">
                    AI 解析已特別設定為<strong>急診專科醫師/EMS教官</strong>的思維模型，並以《大白第三版》為推論依據。建議您在教學前，仍憑藉您的專業臨床經驗進行最後的審閱。
                </p>
            </div>
        </div>

        <!-- 右側結果展示區 -->
        <div class="lg:col-span-8">
            <div class="bg-white rounded-2xl shadow-sm p-6 md:p-8 border border-slate-200 min-h-[600px]">
                
                <div class="flex justify-between items-center mb-6 pb-4 border-b border-slate-200">
                    <h2 class="text-xl font-extrabold text-slate-800 flex items-center gap-2">
                        <i class="fa-solid fa-list-check text-blue-600"></i> 考題與解析列表
                    </h2>
                    <span id="resultCountBadge" class="hidden bg-blue-100 text-blue-800 px-4 py-1.5 rounded-full text-sm font-bold shadow-sm">
                        篩選出 0 題
                    </span>
                </div>
                
                <div id="resultsContainer" class="space-y-6">
                    <!-- 預設空白狀態 -->
                    <div class="flex flex-col justify-center items-center py-20 text-slate-400">
                        <div class="bg-slate-50 p-6 rounded-full mb-4 border border-slate-100">
                            <i class="fa-solid fa-book-open text-5xl text-slate-300"></i>
                        </div>
                        <p class="font-medium text-slate-500">請在左側輸入章節編號，開始篩選歷屆考題。</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // --- 設定區 ---
        const apiKey = ""; // 系統執行環境會自動注入 Gemini API Key

        // --- 全域變數 ---
        let allQuestions = [];
        
        // --- DOM 元素綁定 ---
        const statusContainer = document.getElementById('statusContainer');
        const csvFileInput = document.getElementById('csvFileInput');
        const chapterInput = document.getElementById('chapterInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsContainer = document.getElementById('resultsContainer');
        const resultCountBadge = document.getElementById('resultCountBadge');

        // --- 初始化：網頁載入時自動從雲端抓取 CSV ---
        window.addEventListener('DOMContentLoaded', () => {
            const csvUrl = '考古題全.csv'; // 注意：此檔名必須與上傳至 GitHub 的完全一致
            
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    processData(results.data);
                },
                error: function(err) {
                    console.warn("自動載入失敗，將開啟手動上傳模式", err);
                    statusContainer.innerHTML = `
                        <div class="bg-red-50 p-4 rounded-xl border border-red-200 text-red-800">
                            <div class="flex items-center gap-2 font-bold text-sm mb-1">
                                <i class="fa-solid fa-triangle-exclamation text-red-600"></i> 載入失敗
                            </div>
                            <div class="text-xs text-red-600">找不到雲端題庫，請由下方手動上傳 CSV。</div>
                        </div>`;
                }
            });
        });

        // --- 手動上傳 CSV 處理 ---
        csvFileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            statusContainer.innerHTML = `
                <div class="flex flex-col items-center justify-center p-6 bg-blue-50 rounded-xl border border-blue-100">
                    <span class="loader mb-3"></span>
                    <span class="text-sm text-blue-800 font-bold">正在解析本地檔案...</span>
                </div>`;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    processData(results.data);
                },
                error: function(err) {
                    statusContainer.innerHTML = `
                        <div class="bg-red-50 p-4 rounded-xl border border-red-200 text-red-800">
                            <i class="fa-solid fa-triangle-exclamation text-red-600"></i> 檔案解析失敗，請確認格式。
                        </div>`;
                }
            });
        });

        // --- 資料處理 ---
        function processData(data) {
            // 正規化 CSV 欄位名稱 (去除隱藏的多餘空白)，並過濾掉空行
            allQuestions = data.map(row => {
                const cleanRow = {};
                for (let key in row) {
                    cleanRow[key.trim()] = row[key];
                }
                return cleanRow;
            }).filter(row => row['完整題目'] && row['完整題目'].trim() !== '');
            
            // 更新狀態 UI
            statusContainer.innerHTML = `
                <div class="flex items-center gap-3 bg-emerald-50 p-4 rounded-xl border border-emerald-200 text-emerald-800">
                    <i class="fa-solid fa-circle-check text-2xl text-emerald-600 flex-shrink-0"></i>
                    <div>
                        <div class="font-bold text-sm">題庫已就緒</div>
                        <div class="text-xs text-emerald-600 mt-0.5">系統共載入 ${allQuestions.length} 題</div>
                    </div>
                </div>`;
            
            // 若輸入框已有值，自動觸發搜尋
            if (chapterInput.value.trim() !== '') {
                performSearch();
            }
        }

        // --- 搜尋邏輯 ---
        function extractChapterNumber(str) {
            if (!str) return '';
            const match = str.toString().match(/\d+/);
            return match ? match[0] : '';
        }

        function performSearch() {
            if (allQuestions.length === 0) {
                alert("題庫尚未載入完成，請稍候或手動上傳！");
                return;
            }

            const query = chapterInput.value.trim();
            if (query === '') {
                alert("請輸入大白第三版的章節數字！");
                return;
            }

            const targetChapter = extractChapterNumber(query);
            
            const filteredQuestions = allQuestions.filter(q => {
                const qChapter = extractChapterNumber(q['章節出處'] || q['章節'] || '');
                return qChapter === targetChapter;
            });

            renderResults(filteredQuestions);
        }

        searchBtn.addEventListener('click', performSearch);
        chapterInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        // --- 渲染搜尋結果與單一卡片邏輯 ---
        function renderResults(questions) {
            resultsContainer.innerHTML = '';
            
            // 更新計數標籤
            resultCountBadge.classList.remove('hidden');
            resultCountBadge.textContent = `篩選出 ${questions.length} 題`;

            if (questions.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="flex flex-col justify-center items-center py-20 bg-slate-50 rounded-xl border border-dashed border-slate-300">
                        <i class="fa-solid fa-folder-open text-4xl text-slate-300 mb-3"></i>
                        <p class="font-medium text-slate-500">找不到該章節的考題，請確認章節編號是否正確。</p>
                    </div>`;
                return;
            }

            questions.forEach((q, index) => {
                const year = q['年份'] || '未知';
                const qNum = q['題號'] || '-';
                const answer = q['答案'] || '未知';
                const qText = q['完整題目'] || '';
                const chapterName = q['名稱'] || '';
                
                // 建立卡片元素
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden hover:shadow-md transition-all duration-300";
                
                card.innerHTML = `
                    <!-- 標頭資訊 -->
                    <div class="bg-slate-50 px-5 py-3 border-b border-slate-200 flex flex-wrap gap-3 justify-between items-center">
                        <div class="flex items-center gap-3">
                            <span class="bg-blue-800 text-white text-xs font-bold px-3 py-1.5 rounded-md shadow-sm">第 ${year} 年</span>
                            <span class="text-sm font-semibold text-slate-700">題號：${qNum}</span>
                        </div>
                        <div class="flex items-center text-xs font-medium text-slate-500 bg-white border border-slate-200 px-3 py-1.5 rounded-full shadow-sm">
                            <i class="fa-solid fa-tag mr-1.5"></i> ${chapterName}
                        </div>
                    </div>

                    <div class="p-6">
                        <!-- 題目內容 -->
                        <p class="text-slate-800 font-medium whitespace-pre-line mb-6 text-[15px] leading-relaxed">${escapeHtml(qText)}</p>
                        
                        <!-- 操作按鈕區塊 (顯示標準答案及產生解析按鈕) -->
                        <div class="flex flex-wrap items-center justify-between mt-6 bg-blue-50/60 p-4 rounded-xl border border-blue-100 gap-4">
                            <div class="font-bold text-blue-900 flex items-center gap-2">
                                標準答案： 
                                <span class="text-lg bg-white px-4 py-1 rounded-lg shadow-sm border border-blue-200 text-blue-700">${escapeHtml(answer)}</span>
                            </div>
                            <button class="generate-btn flex items-center gap-2 px-5 py-2 rounded-lg text-sm font-bold transition-all shadow-sm bg-white border border-blue-600 text-blue-600 hover:bg-blue-600 hover:text-white">
                                <i class="fa-solid fa-wand-magic-sparkles"></i> 產生 AI 解析
                            </button>
                        </div>

                        <!-- 解析呈現區塊 (預設隱藏) -->
                        <div class="explanation-container hidden mt-6 border-t border-dashed border-slate-200 pt-6 transition-all duration-500">
                            <div class="bg-slate-50 rounded-xl p-6 border border-slate-200 shadow-inner">
                                <h4 class="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2 border-b border-slate-200 pb-2">
                                    <i class="fa-regular fa-file-lines text-blue-600"></i> 專家級解析
                                </h4>
                                <div class="explanation-content markdown-body"></div>
                            </div>
                        </div>
                    </div>
                `;

                // --- 單一卡片的獨立狀態管理 ---
                const btn = card.querySelector('.generate-btn');
                const expContainer = card.querySelector('.explanation-container');
                const expContent = card.querySelector('.explanation-content');

                btn.addEventListener('click', async () => {
                    // 1. 設定 Loading 狀態
                    btn.disabled = true;
                    btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 正在推演中...`;
                    btn.className = "generate-btn flex items-center gap-2 px-5 py-2 rounded-lg text-sm font-bold shadow-sm bg-blue-100 text-blue-600 cursor-not-allowed border border-blue-200";
                    
                    expContainer.classList.remove('hidden');
                    expContent.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-6 text-slate-400 gap-3">
                            <span class="loader loader-lg"></span>
                            <span class="text-sm animate-pulse">正在參照《大白第三版》彙整學理脈絡...</span>
                        </div>`;

                    try {
                        // 2. 呼叫 Gemini API
                        const explanation = await fetchGeminiExplanation(qText, answer, chapterName);
                        
                        // 3. 設定 Success 狀態
                        expContent.innerHTML = marked.parse(explanation);
                        btn.innerHTML = `<i class="fa-solid fa-check"></i> 解析已產生`;
                        btn.className = "generate-btn flex items-center gap-2 px-5 py-2 rounded-lg text-sm font-bold shadow-sm bg-green-50 border border-green-500 text-green-700 cursor-default";
                    } catch (error) {
                        // 4. 設定 Error 狀態
                        expContent.innerHTML = `
                            <div class="text-red-500 p-3 bg-red-50 rounded-lg border border-red-100 text-sm">
                                <i class="fa-solid fa-triangle-exclamation"></i> 發生錯誤：${error.message}
                            </div>`;
                        btn.disabled = false;
                        btn.innerHTML = `<i class="fa-solid fa-rotate-right"></i> 重試產生`;
                        btn.className = "generate-btn flex items-center gap-2 px-5 py-2 rounded-lg text-sm font-bold shadow-sm bg-red-50 border border-red-500 text-red-600 hover:bg-red-100 transition-all";
                    }
                });

                resultsContainer.appendChild(card);
            });
        }

        // --- Gemini API 核心呼叫邏輯 (包含指數退避重試) ---
        async function fetchGeminiExplanation(question, answer, chapterName) {
            const prompt = `您好，我是一名急診專科醫師與EMS領域專家。請以專業的角度，針對以下高級救護技術員(EMT-P)歷屆考題提供詳細解析。
請參考《高級救護技術員教科書 第三版》(大白第三版) 中關於「${chapterName}」的相關學理內容來進行解說。

【題目】：
${question}

【標準答案】：${answer}

【請提供】：
1. **正確詳解**：為什麼該選項是正確的？背後的病生理機制、處置流程或相關法規為何？
2. **錯誤選項分析**：其他選項為何錯誤？（若題目有其他選項）
3. **核心考點**：此題測驗的 EMT-P 核心觀念為何？

請使用繁體中文，語氣保持專業且詳盡。段落請使用適當的 Markdown 標記來排版。`;

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { 
                    parts: [{ 
                        text: "你是一位精通緊急醫療救護(EMS)、急診醫學與品質管理的 AI 助理。請提供高度專業、邏輯清晰的繁體中文解析，並以符合急診專科醫師與高階救護教官的口吻進行回答。" 
                    }] 
                }
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) throw new Error(`API 請求失敗 (狀態碼: ${response.status})`);
                    
                    const data = await response.json();
                    if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts) {
                        return data.candidates[0].content.parts[0].text;
                    } else {
                        throw new Error('API 回傳格式異常');
                    }
                } catch (error) {
                    if (i === 4) throw error; // 最後一次重試失敗才拋出錯誤
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2; // 指數退避 (1s, 2s, 4s, 8s...)
                }
            }
        }

        // --- 工具：防止 XSS 攻擊的字串處理 ---
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
