<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMT-P 歷屆考題與解析產生器</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Marked for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f3f4f6; }
        /* Markdown Styles */
        .markdown-body { font-size: 1rem; line-height: 1.6; color: #374151; }
        .markdown-body h3 { font-size: 1.25rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; color: #111827; }
        .markdown-body p { margin-bottom: 1rem; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body strong { font-weight: 700; color: #1f2937; }
        
        .loader {
            border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #3b82f6;
            width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen pb-12">

    <!-- Header -->
    <header class="bg-blue-800 text-white shadow-md py-6 px-4 mb-8">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold flex items-center gap-3">
                    <i class="fa-solid fa-briefcase-medical"></i> EMT-P 歷屆考題與解析產生器
                </h1>
                <p class="text-blue-200 mt-2 text-sm md:text-base">專為急診醫師與 EMS 專家設計的教學備課工具，整合《大白第三版》知識庫。</p>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 grid grid-cols-1 md:grid-cols-12 gap-6">
        
        <!-- Left Column: Controls -->
        <div class="md:col-span-4 space-y-6">
            
            <!-- Step 1: Databank Status -->
            <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
                <h2 class="text-lg font-bold mb-3 flex items-center gap-2 text-gray-700">
                    <span class="bg-blue-100 text-blue-700 w-6 h-6 rounded-full flex items-center justify-center text-sm">1</span> 題庫狀態
                </h2>
                
                <div id="cloudLoadStatus" class="flex flex-col items-center justify-center p-4 bg-blue-50 rounded-lg border border-blue-100 mb-3">
                    <span class="loader mb-2 border-t-blue-600"></span>
                    <span class="text-sm text-blue-700 font-medium">正在從雲端載入題庫...</span>
                </div>

                <div id="fileStatus" class="hidden mt-2 text-sm text-green-700 font-medium text-center bg-green-50 p-3 rounded-lg border border-green-200">
                    <i class="fa-solid fa-circle-check"></i> 雲端題庫已就緒：共 <span id="questionCount">0</span> 題
                </div>
                
                <div class="mt-4 pt-4 border-t border-gray-100 text-center">
                    <p class="text-xs text-gray-400 mb-2">若雲端載入失敗，您仍可手動上傳</p>
                    <label class="inline-flex justify-center items-center px-4 py-2 bg-white text-gray-600 rounded-lg border border-gray-300 cursor-pointer hover:bg-gray-50 transition text-xs shadow-sm">
                        <i class="fa-solid fa-folder-open mr-2"></i> 手動選擇 CSV
                        <input type="file" id="csvFileInput" accept=".csv" class="hidden">
                    </label>
                </div>
            </div>

            <!-- Step 2: Search -->
            <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
                <h2 class="text-lg font-bold mb-3 flex items-center gap-2 text-gray-700">
                    <span class="bg-blue-100 text-blue-700 w-6 h-6 rounded-full flex items-center justify-center text-sm">2</span> 篩選章節
                </h2>
                <p class="text-sm text-gray-500 mb-3">輸入數字即可 (例如：56)</p>
                <div class="flex gap-2">
                    <input type="text" id="chapterInput" placeholder="例如: 1, 54, 56" 
                        class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button id="searchBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition shadow-sm">
                        <i class="fa-solid fa-magnifying-glass"></i> 搜尋
                    </button>
                </div>
            </div>

            <!-- Info Card -->
            <div class="bg-yellow-50 rounded-xl p-5 border border-yellow-200 text-sm text-yellow-800">
                <h3 class="font-bold mb-1 flex items-center gap-2"><i class="fa-solid fa-lightbulb"></i> 系統提示</h3>
                <p>AI 解析是依據大語言模型(Gemini)進行推論，並模擬參照《大白第三版》知識。產生解析後，建議您憑藉自身的醫療專業進行最後核閱。</p>
            </div>
        </div>

        <!-- Right Column: Results -->
        <div class="md:col-span-8">
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 min-h-[500px]">
                <div class="flex justify-between items-center mb-4 border-b pb-3">
                    <h2 class="text-xl font-bold text-gray-800">篩選結果</h2>
                    <span id="resultCount" class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-sm font-medium">共 0 題</span>
                </div>
                
                <div id="resultsContainer" class="space-y-6">
                    <!-- Default State -->
                    <div class="text-center py-16 text-gray-400" id="emptyState">
                        <i class="fa-solid fa-book-open text-5xl mb-4 text-gray-300"></i>
                        <p>請先載入題庫，並輸入章節編號進行搜尋。</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // Gemini API Configuration
        const apiKey = ""; // The execution environment provides the key at runtime

        // Global State
        let allQuestions = [];
        
        // DOM Elements
        const csvFileInput = document.getElementById('csvFileInput');
        const cloudLoadStatus = document.getElementById('cloudLoadStatus');
        const fileStatus = document.getElementById('fileStatus');
        const questionCountEl = document.getElementById('questionCount');
        const chapterInput = document.getElementById('chapterInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsContainer = document.getElementById('resultsContainer');
        const emptyState = document.getElementById('emptyState');
        const resultCount = document.getElementById('resultCount');

        // Process loaded data
        function processData(data) {
            // Filter out empty rows
            allQuestions = data.filter(row => row['完整題目'] && row['完整題目'].trim() !== '');
            
            if (cloudLoadStatus) cloudLoadStatus.classList.add('hidden');
            fileStatus.classList.remove('hidden');
            questionCountEl.textContent = allQuestions.length;
            
            // Auto-trigger search if input has value
            if (chapterInput.value.trim() !== '') {
                performSearch();
            }
        }

        // Auto-load CSV from server on page load
        window.addEventListener('DOMContentLoaded', () => {
            // 注意：這裡的檔名必須與上傳到 GitHub 的檔名完全一致
            const csvUrl = '考古題全.csv'; 
            
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    processData(results.data);
                },
                error: function(err) {
                    console.warn("自動載入失敗，請確認檔案是否已上傳。", err);
                    cloudLoadStatus.innerHTML = `<span class="text-red-500 text-sm font-medium"><i class="fa-solid fa-triangle-exclamation"></i> 找不到雲端題庫，請手動上傳。</span>`;
                }
            });
        });

        // Handle Manual File Upload (Fallback)
        csvFileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            cloudLoadStatus.classList.add('hidden'); // Hide error if user uploads manually

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    processData(results.data);
                },
                error: function(err) {
                    alert("檔案解析失敗，請確認是否為正確的 CSV 格式。");
                    console.error(err);
                }
            });
        });

        // Search Logic
        function extractChapterNumber(str) {
            if (!str) return '';
            // Extract all digits from string (e.g. "第 56 章" -> "56")
            const match = str.toString().match(/\d+/);
            return match ? match[0] : '';
        }

        function performSearch() {
            if (allQuestions.length === 0) {
                alert("請先載入題庫！");
                return;
            }

            const query = chapterInput.value.trim();
            if (query === '') {
                alert("請輸入章節號碼！");
                return;
            }

            const targetChapter = extractChapterNumber(query);
            
            const filteredQuestions = allQuestions.filter(q => {
                const qChapter = extractChapterNumber(q['章節出處'] || q['章節'] || '');
                return qChapter === targetChapter;
            });

            renderResults(filteredQuestions);
        }

        searchBtn.addEventListener('click', performSearch);
        chapterInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        // Render Results
        function renderResults(questions) {
            resultsContainer.innerHTML = '';
            resultCount.textContent = `共 ${questions.length} 題`;

            if (questions.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="text-center py-16 text-gray-500 bg-gray-50 rounded-lg border border-dashed border-gray-200">
                        <i class="fa-regular fa-face-frown-open text-4xl mb-3 text-gray-300"></i>
                        <p>找不到該章節的考題，請嘗試其他章節編號。</p>
                    </div>`;
                return;
            }

            questions.forEach((q, index) => {
                // Prepare Data
                const year = q['年份'] || '未知';
                const qNum = q['題號'] || '-';
                const answer = q['答案'] || '未知';
                const qText = q['完整題目'] || '';
                const chapterName = q['名稱'] || '';
                
                // Card Element
                const card = document.createElement('div');
                card.className = "bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden hover:shadow-md transition-shadow";
                
                card.innerHTML = `
                    <div class="bg-gray-50 px-4 py-3 border-b border-gray-200 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <span class="bg-blue-800 text-white text-xs font-bold px-2 py-1 rounded">第 ${year} 年</span>
                            <span class="text-sm font-medium text-gray-600">題號：${qNum}</span>
                        </div>
                        <span class="text-xs text-gray-500 bg-white border border-gray-200 px-2 py-1 rounded-md"><i class="fa-solid fa-tag"></i> ${chapterName}</span>
                    </div>
                    <div class="p-5">
                        <p class="text-gray-800 font-medium whitespace-pre-line mb-4 text-[15px] leading-relaxed">${escapeHtml(qText)}</p>
                        
                        <div class="flex items-center justify-between mt-6 bg-blue-50/50 p-3 rounded-lg border border-blue-100">
                            <div class="font-bold text-blue-800">
                                標準答案： <span class="text-lg bg-white px-3 py-0.5 rounded shadow-sm border border-blue-200">${escapeHtml(answer)}</span>
                            </div>
                            <button class="generate-btn bg-white border border-blue-600 text-blue-600 hover:bg-blue-600 hover:text-white px-4 py-1.5 rounded-md text-sm font-bold transition flex items-center gap-2">
                                <i class="fa-solid fa-wand-magic-sparkles"></i> 產生 AI 解析
                            </button>
                        </div>

                        <!-- Explanation Container (Hidden by default) -->
                        <div class="explanation-container hidden mt-4 border-t border-dashed border-gray-300 pt-4">
                            <div class="bg-gray-50 rounded-lg p-5 border border-gray-200">
                                <div class="explanation-content markdown-body text-sm"></div>
                            </div>
                        </div>
                    </div>
                `;

                // Add Event Listener to button
                const btn = card.querySelector('.generate-btn');
                const expContainer = card.querySelector('.explanation-container');
                const expContent = card.querySelector('.explanation-content');

                btn.addEventListener('click', async () => {
                    // Disable button and show loading
                    btn.disabled = true;
                    btn.innerHTML = `<span class="loader"></span> 正在彙整知識庫...`;
                    expContainer.classList.remove('hidden');
                    expContent.innerHTML = `<p class="text-gray-500 flex items-center gap-2"><span class="loader"></span> 正在呼叫 Gemini 模型進行學理推演，請稍候...</p>`;

                    try {
                        const explanation = await fetchGeminiExplanation(qText, answer, chapterName);
                        expContent.innerHTML = marked.parse(explanation);
                        btn.innerHTML = `<i class="fa-solid fa-check"></i> 解析已產生`;
                        btn.classList.replace('text-blue-600', 'text-green-600');
                        btn.classList.replace('border-blue-600', 'border-green-600');
                        btn.classList.remove('hover:bg-blue-600');
                    } catch (error) {
                        expContent.innerHTML = `<p class="text-red-500"><i class="fa-solid fa-triangle-exclamation"></i> 產生解析時發生錯誤：${error.message}</p>`;
                        btn.disabled = false;
                        btn.innerHTML = `<i class="fa-solid fa-rotate-right"></i> 重試產生`;
                    }
                });

                resultsContainer.appendChild(card);
            });
        }

        // Gemini API Interaction with Exponential Backoff
        async function fetchGeminiExplanation(question, answer, chapterName) {
            const prompt = `您好，我是一名急診專科醫師與EMS領域專家。請以專業的角度，針對以下高級救護技術員(EMT-P)歷屆考題提供詳細解析。
請參考《高級救護技術員教科書 第三版》(大白第三版) 中關於「${chapterName}」的相關學理內容來進行解說。

【題目】：
${question}

【標準答案】：${answer}

【請提供】：
1. **正確詳解**：為什麼該選項是正確的？背後的病生理機制、處置流程或相關法規為何？
2. **錯誤選項分析**：其他選項為何錯誤？（若題目有其他選項）
3. **核心考點**：此題測驗的 EMT-P 核心觀念為何？

請使用繁體中文，語氣保持專業且詳盡。段落請使用適當的 Markdown 標記來排版。`;

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { 
                    parts: [{ 
                        text: "你是一位精通緊急醫療救護(EMS)、急診醫學與品質管理的 AI 助理。請提供高度專業、邏輯清晰的繁體中文解析，並以符合急診專科醫師與高階救護教官的口吻進行回答。" 
                    }] 
                }
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) {
                        throw new Error(`API 請求失敗 (狀態碼: ${response.status})`);
                    }
                    
                    const data = await response.json();
                    if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts) {
                        return data.candidates[0].content.parts[0].text;
                    } else {
                        throw new Error('API 回傳格式異常');
                    }
                } catch (error) {
                    if (i === 4) throw error; // If last retry fails, throw error
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2; // Exponential backoff
                }
            }
        }

        // Utility: Escape HTML to prevent XSS
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
